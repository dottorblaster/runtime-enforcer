apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runtime-enforcer.fullname" . }}-controller-manager
  labels:
    control-plane: controller-manager
  {{- include "runtime-enforcer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: controller
    {{- include "runtime-enforcer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "runtime-enforcer.labels" . | nindent 8 }}
        app.kubernetes.io/component: controller
      {{- with .Values.controller.podLabels }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
      {{- with .Values.controller.podAnnotations }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.priorityClass.name }}
      priorityClassName: {{ .Values.priorityClass.name }}
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- include "imagePullSecrets" .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
      - args: 
        - --wp-status-reconciler-agent-grpc-port={{ .Values.agent.grpcExporterPort }}
        - --wp-status-reconciler-update-interval={{ .Values.controller.wpStatusUpdateInterval }}
        - --wp-status-reconciler-agent-label-selector={{ include "runtime-enforcer.agent.labelSelectorString" . }}
        - --wp-status-reconciler-agent-grpc-mtls-cert-dir={{ include "runtime-enforcer.grpc.certDir" . }}
        - --log-level={{ .Values.controller.logLevel }}
        {{- toYaml .Values.controller.args | nindent 8 }}
        command:
        - /controller
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        {{- if eq .Values.telemetry.collectorStrategy "default" }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: https://{{ include "runtime-enforcer.fullname" . }}-otel-collector.{{ .Release.Namespace }}.svc.cluster.local:4317
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: grpc
        - name: OTEL_EXPORTER_OTLP_CERTIFICATE
          value: {{ include "runtime-enforcer.grpc.certDir" . }}/ca.crt
        {{- else if eq .Values.telemetry.collectorStrategy "external" }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .Values.telemetry.externalCollector.endpoint }}
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: {{ .Values.telemetry.externalCollector.protocol }}
        {{- if .Values.telemetry.externalCollector.otelCollectorCertificateSecret }}
        - name: OTEL_EXPORTER_OTLP_CERTIFICATE
          value: /tmp/otel-collector-certs/ca.crt
        {{- else }}
        - name: OTEL_EXPORTER_OTLP_INSECURE
          value: "true"
        {{- end }}
        {{- if .Values.telemetry.externalCollector.otelCollectorClientCertificateSecret }}
        - name: OTEL_EXPORTER_OTLP_CLIENT_CERTIFICATE
          value: /tmp/otel-collector-client-certs/tls.crt
        - name: OTEL_EXPORTER_OTLP_CLIENT_KEY
          value: /tmp/otel-collector-client-certs/tls.key
        {{- end }}
        {{- end }}
        {{- with .Values.controller.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        image: {{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}
        imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources: {{- toYaml .Values.controller.resources | nindent 10
          }}
        securityContext: {{- toYaml .Values.controller.containerSecurityContext
          | nindent 10 }}
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs/
          name: webhook-certs
          readOnly: true
        - name: grpc-certs
          mountPath: {{ include "runtime-enforcer.grpc.certDir" . }}
          readOnly: true
        {{- if .Values.telemetry.externalCollector.otelCollectorCertificateSecret }}
        - name: otel-collector-ca-cert
          mountPath: /tmp/otel-collector-certs
          readOnly: true
        {{- end }}
        {{- if .Values.telemetry.externalCollector.otelCollectorClientCertificateSecret }}
        - name: otel-collector-client-cert
          mountPath: /tmp/otel-collector-client-certs
          readOnly: true
        {{- end }}
      volumes:
      - name: webhook-certs
        csi:
          driver: "csi.cert-manager.io"
          readOnly: true
          volumeAttributes:
            csi.cert-manager.io/issuer-name: {{ include "runtime-enforcer.caIssuerName" . }}
            csi.cert-manager.io/issuer-kind: Issuer
            csi.cert-manager.io/dns-names: {{ include "runtime-enforcer.fullname" . }}-controller-webhook.{{ .Release.Namespace }}.svc
      - name: grpc-certs
        csi:
          driver: "csi.cert-manager.io"
          readOnly: true
          volumeAttributes:
            csi.cert-manager.io/issuer-name: {{ include "runtime-enforcer.caIssuerName" . }}
            csi.cert-manager.io/issuer-kind: Issuer
            csi.cert-manager.io/dns-names: {{ include "runtime-enforcer.fullname" . }}-controller
      {{- if and (eq .Values.telemetry.collectorStrategy "external") .Values.telemetry.externalCollector.otelCollectorCertificateSecret }}
      - name: otel-collector-ca-cert
        secret:
          secretName: {{ .Values.telemetry.externalCollector.otelCollectorCertificateSecret }}
      {{- end }}
      {{- if and (eq .Values.telemetry.collectorStrategy "external") .Values.telemetry.externalCollector.otelCollectorClientCertificateSecret }}
      - name: otel-collector-client-cert
        secret:
          secretName: {{ .Values.telemetry.externalCollector.otelCollectorClientCertificateSecret }}
      {{- end }}
      securityContext: {{- toYaml .Values.controller.podSecurityContext | nindent
        8 }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "runtime-enforcer.fullname" . }}-controller-manager
      terminationGracePeriodSeconds: 10
