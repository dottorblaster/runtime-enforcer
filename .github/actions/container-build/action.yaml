name: container-build
description: build/sign an image and publish its digest in artifact
inputs:
  digest_artifact_prefix:
    description: the prefix of the artifact filename
    default: digest-
  arch:
    description: |
      List of target architectures to build.
    default: amd64
  dockerfile:
    description: |
      The dockerfile to build
    default: Dockerfile
  image:
    description: |
      The image name component in a fully qualified image. For reference:
      ghcr.io/<repo>/<image>:<tag>
    required: true
  repo:
    description: |
      The repository component in a fully qualified image. For reference:
      ghcr.io/<repo>/<image>:<tag>
    required: true
  GH_TOKEN:
    description: |
      The GitHub token with permission to publish images to ghcr.
    required: true
runs:
  using: composite
  steps: 
    - name: Setup QEMU
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      with:
        image: tonistiigi/binfmt:qemu-v10.0.4
        cache-image: false
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
    - name: Login to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.GH_TOKEN }}
    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ghcr.io/${{ inputs.repo }}/${{ inputs.image }}
    - name: Build and push ${{ inputs.image }} for ${{ inputs.arch }}
      id: build-image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/${{ inputs.arch }}
        push: true
        sbom: true
        provenance: mode=max
        tags: ghcr.io/${{ inputs.repo }}/${{ inputs.image }}
        outputs: |
          type=image,push=true,push-by-digest=true,name-canonical=true
    # We need to disable the new bundle format enabled by default since
    # cosign v3.x.x because some verification tools (e.g. slsactl, hauler and old
    # cosign) are not able to properly verify the signatures using this
    # new format
    - name: Sign container image with cosign v2 signature format
      shell: bash
      run: |
        cosign sign --yes --new-bundle-format=false --use-signing-config=false \
          ghcr.io/${INPUTS_REPO}/${INPUTS_IMAGE}@${STEPS_BUILD_IMAGE_OUTPUTS_DIGEST}
      env:
        INPUTS_REPO: ${{ inputs.repo }}
        INPUTS_IMAGE: ${{ inputs.image }}
        STEPS_BUILD_IMAGE_OUTPUTS_DIGEST: ${{ steps.build-image.outputs.digest }}

    - name: Sign container image with cosign v3 signature format
      shell: bash
      run: |
        cosign sign --yes --new-bundle-format=true --use-signing-config=true \
          ghcr.io/${INPUTS_REPO}/${INPUTS_IMAGE}@${STEPS_BUILD_IMAGE_OUTPUTS_DIGEST}
      env:
        INPUTS_REPO: ${{ inputs.repo }}
        INPUTS_IMAGE: ${{ inputs.image }}
        STEPS_BUILD_IMAGE_OUTPUTS_DIGEST: ${{ steps.build-image.outputs.digest }}

    - name: Verify container image signature
      shell: bash
      run: |
        cosign verify \
          --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
          --certificate-identity="${{ github.server_url }}/${GITHUB_WORKFLOW_REF}" \
          ghcr.io/${INPUTS_REPO}/${INPUTS_IMAGE}@${STEPS_BUILD_IMAGE_OUTPUTS_DIGEST}
      env:
        INPUTS_REPO: ${{ inputs.repo }}
        INPUTS_IMAGE: ${{ inputs.image }}
        STEPS_BUILD_IMAGE_OUTPUTS_DIGEST: ${{ steps.build-image.outputs.digest }}

    - name: Export digest
      shell: bash
      run: |
        mkdir -p ${{ runner.temp }}/digests
        digest="${STEPS_BUILD_IMAGE_OUTPUTS_DIGEST}"
        echo "${digest}" > "${{ runner.temp }}/digests/${INPUTS_IMAGE}-${INPUTS_ARCH}.txt"
      env:
        STEPS_BUILD_IMAGE_OUTPUTS_DIGEST: ${{ steps.build-image.outputs.digest }}
        INPUTS_IMAGE: ${{ inputs.image }}
        INPUTS_ARCH: ${{ inputs.arch }}

    - name: Upload digest
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.digest_artifact_prefix }}${{ inputs.image }}-${{ inputs.arch }}
        path: ${{ runner.temp }}/digests/*.txt
        retention-days: 1
